name: Build and Push Frontend Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/arthosbraga/personalsite-front:latest

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Trigger Kubernetes deployment update
        shell: powershell
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          $tempKubeconfig = Join-Path $env:RUNNER_TEMP "kubeconfig"
          $env:KUBECONFIG_DATA | Out-File -FilePath $tempKubeconfig -Encoding utf8
          Add-Content -Path $env:GITHUB_ENV -Value "KUBECONFIG=$tempKubeconfig"

          $configContent = ""
          if (Test-Path $tempKubeconfig) {
            $configContent = Get-Content -Path $tempKubeconfig -Raw
          }
          if ([string]::IsNullOrWhiteSpace($configContent) -or $configContent -notmatch "apiVersion:") {
            Write-Host "ERRO FATAL: O Secret KUBECONFIG não foi encontrado ou está vazio."
            exit 1
          }
          
          # Força o restart do deployment para baixar a nova imagem ghcr.io/arthosbraga/personalsite-front:latest
          # Nota: ajuste 'personalsite-front' e 'personal-infra' se os nomes diferirem no seu cluster
          kubectl rollout restart deployment personalsite-front -n personal-infra
